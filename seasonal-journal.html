<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Turning Year · A Seasonal Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4e6;
    --bg-deep: #dde5c8;
    --ink: #1f2b1a;
    --ink-soft: #3e5234;
    --ink-faint: #7d8f70;
    --accent: #d4708f;
    --accent-soft: #f0a8be;
    --accent-deep: #a84d6a;
    --card: #fafdf3;
    --glow-a: rgba(240, 168, 190, 0.28);
    --glow-b: rgba(175, 200, 140, 0.22);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.8s ease, color 0.8s ease;
  }

  body {
    background:
      radial-gradient(ellipse at 15% 10%, var(--glow-a) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 85%, var(--glow-b) 0%, transparent 50%),
      var(--bg);
    background-attachment: fixed;
    padding: 4vh 5vw 8vh;
    position: relative;
    transition: background 0.8s ease;
  }

  /* Season switcher */
  .season-switcher {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    background: var(--card);
    border: 1.5px solid var(--bg-deep);
    border-radius: 30px;
    padding: 0.5rem 0.8rem;
    box-shadow: 0 4px 14px rgba(31, 43, 26, 0.1);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .season-switcher label {
    font-family: 'Caveat', cursive;
    font-size: 1.05rem;
    color: var(--ink-soft);
  }

  .season-switcher select {
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    color: var(--accent-deep);
    background: transparent;
    border: none;
    outline: none;
    cursor: pointer;
    padding: 0.2rem 0.5rem;
    font-weight: 600;
  }

  /* Corner mascot */
  .corner-mascot {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 80px;
    height: 80px;
    z-index: 3;
    opacity: 0.9;
    transition: transform 0.5s ease;
  }
  .corner-mascot:hover { transform: rotate(-5deg) scale(1.1); }

  /* Seasonal overlay effects */
  .season-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  /* Spring: floating petals */
  body.season-spring .petal {
    position: absolute;
    width: 12px;
    height: 12px;
    background: radial-gradient(circle, #f8c8d4 30%, #e89ab0 100%);
    border-radius: 50% 10% 50% 10%;
    opacity: 0.7;
    animation: petal-fall linear infinite;
  }

  @keyframes petal-fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(50px); opacity: 0; }
  }

  /* Summer: sun rays and fireflies */
  body.season-summer .firefly {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff5a3;
    border-radius: 50%;
    box-shadow: 0 0 8px 2px rgba(255, 245, 163, 0.8);
    animation: firefly-drift ease-in-out infinite;
  }

  @keyframes firefly-drift {
    0%, 100% { transform: translate(0, 0); opacity: 0.3; }
    25% { transform: translate(30px, -20px); opacity: 1; }
    50% { transform: translate(60px, 10px); opacity: 0.6; }
    75% { transform: translate(20px, 30px); opacity: 1; }
  }

  /* Fall: falling leaves */
  body.season-fall .leaf {
    position: absolute;
    font-size: 20px;
    opacity: 0.8;
    animation: leaf-fall linear infinite;
  }

  @keyframes leaf-fall {
    0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    50% { transform: translateY(50vh) rotate(360deg) translateX(100px); }
    90% { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(-50px); opacity: 0; }
  }

  /* Winter: snowflakes */
  body.season-winter .snow {
    position: absolute;
    color: #fff;
    opacity: 0.8;
    animation: snow-fall linear infinite;
    text-shadow: 0 0 4px rgba(200, 220, 240, 0.8);
  }

  @keyframes snow-fall {
    0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(110vh) translateX(40px); opacity: 0; }
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
    padding-top: 40px;
  }

  /* Masthead */
  .masthead {
    text-align: center;
    padding: 3vh 0 5vh;
    animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .eyebrow {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    color: var(--accent-deep);
    font-weight: 500;
    margin-bottom: 0.5rem;
    transform: rotate(-1.5deg);
    display: inline-block;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(3rem, 8vw, 5.2rem);
    line-height: 0.95;
    letter-spacing: -0.02em;
    font-style: italic;
    color: var(--ink);
    transition: color 0.8s ease;
  }

  h1 .mark {
    color: var(--accent-deep);
    font-style: normal;
    display: inline-block;
  }

  .date-line {
    font-family: 'Caveat', cursive;
    font-size: 1.4rem;
    margin-top: 1.5rem;
    color: var(--ink-soft);
    font-weight: 400;
    transform: rotate(-0.5deg);
    display: inline-block;
  }

  .header-svg {
    display: block;
    margin: 0 auto 1rem;
    width: 100px;
    height: 70px;
  }

  /* Quote section */
  .quote-section {
    padding: 5vh 0 4vh;
    text-align: center;
    animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s backwards;
  }

  .quote-card {
    background: var(--card);
    border: 1px solid var(--bg-deep);
    border-radius: 8px;
    padding: 3.5rem 2.5rem 2.5rem;
    position: relative;
    box-shadow: 0 8px 24px rgba(31, 43, 26, 0.08), 0 2px 4px rgba(31, 43, 26, 0.04);
    transition: background 0.8s ease, border-color 0.8s ease;
  }

  .quote-card::before {
    content: attr(data-mark);
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    padding: 0 0.8rem;
    font-size: 1.6rem;
    transition: background 0.8s ease;
  }

  blockquote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    line-height: 1.4;
    font-weight: 300;
    color: var(--ink);
    max-width: 560px;
    margin: 0 auto;
  }

  .attribution {
    margin-top: 1.8rem;
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    color: var(--accent-deep);
    font-weight: 500;
  }

  .attribution::before { content: '— '; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 4vh 0 3vh;
    gap: 1rem;
    animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s backwards;
  }

  .divider .line {
    flex: 1;
    max-width: 100px;
    height: 1px;
    background: var(--ink-faint);
    opacity: 0.5;
  }

  .divider .ornament { font-size: 1.4rem; }

  /* Sections */
  .section {
    padding: 2.5vh 0;
    animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s backwards;
  }

  .section-label {
    font-family: 'Caveat', cursive;
    font-size: 1.5rem;
    color: var(--ink-soft);
    margin-bottom: 1rem;
    font-weight: 500;
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
  }

  .section-label .mark-num {
    color: var(--accent-deep);
    font-size: 1.2rem;
  }

  /* Mood grid */
  .mood-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .mood-option {
    background: var(--card);
    border: 1.5px solid var(--bg-deep);
    border-radius: 14px;
    padding: 1.2rem 0.4rem 0.9rem;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    text-align: center;
  }

  .mood-option:hover {
    border-color: var(--accent-deep);
    transform: translateY(-3px);
    box-shadow: 0 6px 14px rgba(31, 43, 26, 0.15);
  }

  .mood-option.selected {
    background: var(--accent-deep);
    border-color: var(--accent-deep);
    transform: translateY(-3px);
  }

  .mood-option.selected .mood-label { color: var(--card); }

  .mood-glyph { font-size: 1.8rem; display: block; margin-bottom: 0.3rem; }

  .mood-label {
    font-family: 'Caveat', cursive;
    font-size: 0.95rem;
    color: var(--ink-soft);
    font-weight: 500;
  }

  /* Prompt blocks */
  .prompt-text {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: var(--ink);
    margin-bottom: 0.8rem;
    line-height: 1.4;
  }

  textarea {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--bg-deep);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    color: var(--ink);
    resize: none;
    outline: none;
    transition: all 0.3s ease;
    min-height: 3rem;
    line-height: 1.5;
  }

  textarea:focus {
    border-color: var(--accent-deep);
    box-shadow: 0 0 0 3px var(--glow-a);
  }

  textarea::placeholder {
    color: var(--ink-faint);
    font-style: italic;
    opacity: 0.7;
  }

  .freewrite {
    min-height: 220px;
    font-size: 1.25rem;
    line-height: 1.9;
    background-image:
      repeating-linear-gradient(
        transparent,
        transparent 1.85rem,
        var(--glow-a) 1.85rem,
        var(--glow-a) calc(1.85rem + 1px)
      );
    background-position: 0 2.6rem;
  }

  /* Breathing section */
  .breath-section {
    margin: 5vh 0;
    text-align: center;
    padding: 4vh 2rem;
    background: var(--card);
    border-radius: 20px;
    border: 1.5px solid var(--bg-deep);
    position: relative;
    overflow: hidden;
    animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s backwards;
    transition: background 0.8s ease, border-color 0.8s ease;
  }

  .breath-title {
    font-family: 'Caveat', cursive;
    font-size: 1.7rem;
    margin-bottom: 2rem;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .breath-mascot {
    width: 220px;
    height: 160px;
    margin: 0 auto;
    position: relative;
  }

  .breath-mascot svg { width: 100%; height: 100%; }

  .breath-mascot .body {
    transform-origin: center center;
    animation: breath 5s ease-in-out infinite;
  }

  @keyframes breath {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .breath-label {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    margin-top: 1rem;
    color: var(--accent-deep);
  }

  .breath-waves {
    position: absolute;
    top: 50%;
    right: 12%;
    font-family: 'Caveat', cursive;
    color: var(--accent-soft);
    font-size: 1.3rem;
    animation: wave-float 2.5s ease-in-out infinite;
    opacity: 0;
  }

  @keyframes wave-float {
    0% { opacity: 0; transform: translateX(0) translateY(0); }
    50% { opacity: 0.7; transform: translateX(15px) translateY(-8px); }
    100% { opacity: 0; transform: translateX(30px) translateY(-16px); }
  }

  /* Close */
  .close {
    text-align: center;
    margin-top: 5vh;
    padding-top: 4vh;
    animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.7s backwards;
  }

  .close .divider { margin-bottom: 2.5rem; }

  .new-quote-btn {
    background: var(--accent-deep);
    border: none;
    padding: 1rem 2.5rem;
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    color: var(--card);
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 500;
    border-radius: 30px;
    box-shadow: 0 4px 12px rgba(31, 43, 26, 0.25);
  }

  .new-quote-btn:hover {
    background: var(--ink);
    transform: translateY(-2px);
  }

  .colophon {
    margin-top: 2.5rem;
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    color: var(--ink-faint);
    line-height: 1.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .mood-grid { grid-template-columns: repeat(3, 1fr); }
    body { padding: 3vh 4vw 6vh; }
    .quote-card { padding: 3rem 1.5rem 2rem; }
    .corner-mascot { width: 55px; height: 55px; top: 10px; right: 10px; }
    .season-switcher { top: 10px; left: 10px; padding: 0.4rem 0.6rem; }
    .season-switcher label { font-size: 0.95rem; }
    .season-switcher select { font-size: 1rem; }
    .container { padding-top: 60px; }
  }
</style>
</head>

  <section class="section">

  <section class="section">

    <div class="prompt-text" id="reflection-prompt"></div>

  </section>

  <section class="section">
    <div class="section-label"><span class="mark-num"></span><span id="evening-heading"></span></div>
    <div class="prompt-text" id="evening-prompt"></div>
    <textarea id="evening-input" rows="2"></textarea>
  </section>

  <div class="close">
    <div class="divider">
      <div class="line"></div>
      <span class="ornament" id="div-mark-2"></span>
      <div class="line"></div>
    </div>
    <button class="new-quote-btn" id="new-quote-btn" onclick="newQuote()"></button>
    <div class="colophon" id="colophon"></div>
  </div>

</div>

/* ============================================================
   LOGIC
   ============================================================ */
let currentSeason = 'spring';
let quoteOffset = 0;

function applyPalette(palette) {
  const root = document.documentElement.style;
  Object.entries({
    'bg': palette.bg, 'bg-deep': palette.bgDeep, 'ink': palette.ink,
    'ink-soft': palette.inkSoft, 'ink-faint': palette.inkFaint,
    'accent': palette.accent, 'accent-soft': palette.accentSoft,
    'accent-deep': palette.accentDeep, 'card': palette.card,
    'glow-a': palette.glowA, 'glow-b': palette.glowB
  }).forEach(([k, v]) => root.setProperty('--' + k, v));
}

function renderParticles(season) {
  const overlay = document.getElementById('season-overlay');
  overlay.innerHTML = '';
  const count = 25;
  const configs = {
    spring: { cls: 'petal', content: '', duration: [10, 18], delay: [0, 15] },
    summer: { cls: 'firefly', content: '', duration: [4, 8], delay: [0, 6] },
    fall: { cls: 'leaf', content: ['🍂', '🍁', '🍃'], duration: [8, 14], delay: [0, 12] },
    winter: { cls: 'snow', content: ['❄', '❅', '❆', '•'], duration: [10, 20], delay: [0, 15] }
  };
  const c = configs[season];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = c.cls;
    el.style.left = Math.random() * 100 + '%';
    el.style.top = (season === 'summer') ? (Math.random() * 100 + '%') : ('-5%');
    el.style.animationDuration = (c.duration[0] + Math.random() * (c.duration[1] - c.duration[0])) + 's';
    el.style.animationDelay = (Math.random() * c.delay[1]) + 's';
    if (Array.isArray(c.content)) {
      el.textContent = c.content[Math.floor(Math.random() * c.content.length)];
      if (season === 'winter') el.style.fontSize = (10 + Math.random() * 12) + 'px';
      if (season === 'fall') el.style.fontSize = (14 + Math.random() * 10) + 'px';
    }
    overlay.appendChild(el);
  }
}

function renderMoods(moods) {
  const grid = document.getElementById('mood-grid');
  grid.innerHTML = '';
  moods.forEach(m => {
    const div = document.createElement('div');
    div.className = 'mood-option';
    div.dataset.mood = m.label;
    div.innerHTML = `<span class="mood-glyph">${m.glyph}</span><span class="mood-label">${m.label}</span>`;
    div.addEventListener('click', () => {
      document.querySelectorAll('.mood-option').forEach(o => o.classList.remove('selected'));
      div.classList.add('selected');
    });
    grid.appendChild(div);
  });
}

function dateString() {
  const d = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const day = d.getDate();
  const suffix = (day % 10 === 1 && day !== 11) ? 'st' :
                 (day % 10 === 2 && day !== 12) ? 'nd' :
                 (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
  return `the ${day}${suffix} of ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

function dailyIndex(arr) {
  const d = new Date();
  const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
  return (dayOfYear * 7) % arr.length;
}

function setQuote() {
  const s = SEASONS[currentSeason];
  const idx = (dailyIndex(s.quotes) + quoteOffset) % s.quotes.length;
  const q = s.quotes[idx];
  const qEl = document.getElementById('quote-text');
  const aEl = document.getElementById('quote-author');
  qEl.style.opacity = 0; aEl.style.opacity = 0;
  setTimeout(() => {
    qEl.textContent = q.text;
    aEl.textContent = q.author;
    qEl.style.transition = 'opacity 0.8s ease';
    aEl.style.transition = 'opacity 0.8s ease';
    qEl.style.opacity = 1; aEl.style.opacity = 1;
  }, 300);
}

function newQuote() { quoteOffset++; setQuote(); }

function detectSeason() {
  const m = new Date().getMonth() + 1;
  if (m >= 3 && m <= 5) return 'spring';
  if (m >= 6 && m <= 8) return 'summer';
  if (m >= 9 && m <= 11) return 'fall';
  return 'winter';
}

function applySeason(key) {
  currentSeason = key;
  quoteOffset = 0;
  const s = SEASONS[key];

  document.body.className = 'season-' + key;
  applyPalette(s.palette);

  document.getElementById('eyebrow').textContent = s.eyebrow;
  document.getElementById('title').innerHTML = `${s.titleLine1} <span class="mark">${s.markLarge}</span><br><span>${s.titleLine2}</span>`;
  document.getElementById('date-line').textContent = dateString();

  document.getElementById('quote-card').setAttribute('data-mark', s.mark);

  document.getElementById('mood-heading').textContent = s.moodHeading;
  document.getElementById('gratitude-heading').textContent = s.gratitudeHeading;
  document.getElementById('gratitude-prompt').textContent = s.gratitudePrompt;
  document.getElementById('gratitude-input').placeholder = s.gratitudePlaceholder;
  document.getElementById('intention-heading').textContent = s.intentionHeading;
  document.getElementById('intention-prompt').textContent = s.intentionPrompt;
  document.getElementById('intention-input').placeholder = s.intentionPlaceholder;
  document.getElementById('breath-title').textContent = s.breathTitle;
  document.getElementById('breath-label').textContent = s.breathLabel;
  document.getElementById('reflect-heading').textContent = s.reflectHeading;
  document.getElementById('reflection-input').placeholder = s.reflectPlaceholder;
  document.getElementById('evening-heading').textContent = s.eveningHeading;
  document.getElementById('evening-prompt').textContent = s.eveningPrompt;
  document.getElementById('evening-input').placeholder = s.eveningPlaceholder;

  document.getElementById('div-mark-1').textContent = s.divMark;
  document.getElementById('div-mark-2').textContent = s.divMarkEnd;
  document.getElementById('new-quote-btn').textContent = s.buttonText;
  document.getElementById('colophon').innerHTML = s.colophon;

  document.querySelectorAll('.mark-num').forEach(el => el.textContent = s.mark);

  document.getElementById('header-svg').innerHTML = SVGS[key].header;
  document.getElementById('corner-mascot').innerHTML = SVGS[key].corner;

  document.getElementById('breath-mascot').innerHTML = `
    ${SVGS[key].breath}
    <div class="breath-waves">${s.breathWave1}</div>
    <div class="breath-waves" style="animation-delay: 1.25s; top: 40%;">${s.breathWave2}</div>
  `;

  renderMoods(s.moods);
  renderParticles(key);

  const rIdx = dailyIndex(s.reflections);
  document.getElementById('reflection-prompt').textContent = s.reflections[rIdx];

  setQuote();
}

// Auto-grow textareas (except freewrite)
document.querySelectorAll('textarea:not(.freewrite)').forEach(ta => {
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  });
});

// Season switcher
document.getElementById('season-select').addEventListener('change', (e) => {
  applySeason(e.target.value);
});

// Init — default to current real-world season
const initial = detectSeason();
document.getElementById('season-select').value = initial;
applySeason(initial);
</script>
